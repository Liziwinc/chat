<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Minimal Messenger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            padding: 8px;
        }

        /* Экран авторизации */
        #auth-screen {
            background: white;
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            width: 100%;
            max-width: 360px;
            text-align: center;
            transition: all 0.2s;
        }

        #auth-screen h2 {
            margin-bottom: 24px;
            color: #2c3e50;
            font-weight: 500;
        }

        #auth-screen input {
            width: 100%;
            padding: 14px 16px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border 0.2s;
        }

        #auth-screen input:focus {
            outline: none;
            border-color: #2196F3;
            box-shadow: 0 0 0 3px rgba(33,150,243,0.1);
        }

        button {
            background: #2196F3;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: 500;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background: #1E88E5;
        }

        button:active {
            transform: scale(0.98);
        }

        /* Основной интерфейс чата */
        #chat-screen {
            display: none;
            width: 100%;
            max-width: 1000px;
            height: 95vh;
            max-height: 800px;
            background: white;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            border-radius: 16px;
            overflow: hidden;
            flex-direction: row;
        }

        /* Сайдбар */
        #sidebar {
            width: 260px;
            background: #1e2b3a;
            color: #ecf0f1;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }

        #sidebar h3 {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 16px;
            color: #fff;
            letter-spacing: 0.3px;
        }

        #online-users {
            list-style: none;
            flex: 1;
        }

        #online-users li {
            padding: 8px 12px;
            margin-bottom: 6px;
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            font-size: 15px;
            word-break: break-word;
        }

        .logout-btn {
            margin-top: 20px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: #ecf0f1;
            padding: 10px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.6);
        }

        /* Основная область чата */
        #main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fafafa;
        }

        #messages {
            flex: 1;
            padding: 20px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .message {
            background: white;
            padding: 12px 16px;
            border-radius: 18px;
            align-self: flex-start;
            max-width: 75%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
            border: 1px solid #eee;
            word-wrap: break-word;
        }

        .message.my {
            background: #e3f2fd;
            border-color: #bbdefb;
            align-self: flex-end;
        }

        .meta {
            font-size: 0.8em;
            color: #7f8c8d;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .meta b {
            color: #2c3e50;
        }

        #input-area {
            display: flex;
            padding: 16px;
            background: white;
            border-top: 1px solid #e0e0e0;
            gap: 12px;
        }

        #message-input {
            flex: 1;
            padding: 14px 16px;
            border: 1px solid #ddd;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            transition: border 0.2s;
        }

        #message-input:focus {
            border-color: #2196F3;
        }

        #input-area button {
            width: auto;
            padding: 14px 24px;
            border-radius: 30px;
            background: #2196F3;
            font-weight: 500;
        }

        /* Адаптивность для планшетов и мобильных */
        @media (max-width: 700px) {
            body {
                padding: 0;
                align-items: flex-start;
            }

            #chat-screen {
                height: 100vh;
                max-height: none;
                border-radius: 0;
                flex-direction: column;
            }

            #sidebar {
                width: 100%;
                padding: 12px 16px;
                flex-direction: row;
                flex-wrap: wrap;
                align-items: center;
                justify-content: space-between;
                overflow-y: visible;
                max-height: none;
            }

            #sidebar h3 {
                margin-bottom: 0;
                font-size: 16px;
            }

            #online-users {
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
                margin: 8px 0;
            }

            #online-users li {
                margin-bottom: 0;
                padding: 6px 14px;
                font-size: 14px;
            }

            .logout-btn {
                margin-top: 0;
                width: auto;
                padding: 8px 16px;
            }

            #main-chat {
                height: 0;
                flex: 1;
            }

            #messages {
                padding: 12px;
            }

            .message {
                max-width: 85%;
            }

            #input-area {
                padding: 12px;
            }

            #message-input {
                padding: 12px 16px;
            }

            #input-area button {
                padding: 12px 18px;
            }
        }

        /* Для очень маленьких экранов */
        @media (max-width: 400px) {
            #sidebar {
                flex-direction: column;
                align-items: flex-start;
            }

            #online-users {
                width: 100%;
            }

            .logout-btn {
                width: 100%;
                margin-top: 8px;
            }

            .message {
                max-width: 90%;
                padding: 10px 14px;
            }
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h2>Вход в чат</h2>
        <input type="text" id="username" placeholder="Логин" autocomplete="username">
        <input type="password" id="password" placeholder="Пароль" autocomplete="current-password">
        <button onclick="login()">Войти</button>
        <p style="margin-top: 16px; font-size: 14px; color: #7f8c8d;">
            Новый аккаунт создаётся автоматически
        </p>
    </div>

    <div id="chat-screen">
        <div id="sidebar">
            <h3>🟢 В сети</h3>
            <ul id="online-users"></ul>
            <button class="logout-btn" onclick="logout()">← Выйти</button>
        </div>
        <div id="main-chat">
            <div id="messages"></div>
            <div id="input-area">
                <input type="text" id="message-input" placeholder="Введите сообщение..." onkeypress="if(event.key === 'Enter') sendMessage()">
                <button onclick="sendMessage()">Отправить</button>
            </div>
        </div>
    </div>

    <script>
        let ws;
        let myUsername = "";

        // ---------- Работа с localStorage ----------
        function saveAuth(username) {
            localStorage.setItem('chat_username', username);
            localStorage.setItem('chat_authenticated', 'true');
        }

        function clearAuth() {
            localStorage.removeItem('chat_username');
            localStorage.removeItem('chat_authenticated');
        }

        function isAuthenticated() {
            return localStorage.getItem('chat_authenticated') === 'true';
        }

        function getSavedUsername() {
            return localStorage.getItem('chat_username');
        }

        // ---------- Выход из чата ----------
        function logout() {
            clearAuth();
            if (ws) {
                ws.close();
            }
            document.getElementById('chat-screen').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'block';
            document.getElementById('messages').innerHTML = '';
            document.getElementById('online-users').innerHTML = '';
            myUsername = "";
        }

        // ---------- Подключение WebSocket ----------
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

            ws.onmessage = function(event) {
                const msg = JSON.parse(event.data);
                
                if (msg.type === "error") {
                    alert(msg.text);
                    // Если ошибка авторизации — сбрасываем сохранённое состояние
                    clearAuth();
                    window.location.reload();
                } else if (msg.type === "init") {
                    // Успешный вход
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('chat-screen').style.display = 'flex';
                    
                    // Сохраняем факт входа
                    saveAuth(myUsername);
                    
                    // Загружаем историю
                    const history = JSON.parse(msg.text);
                    history.forEach(m => renderMessage(m.username, m.text, m.time));
                } else if (msg.type === "chat") {
                    renderMessage(msg.username, msg.text, new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
                } else if (msg.type === "users") {
                    const ul = document.getElementById('online-users');
                    ul.innerHTML = '';
                    msg.users.forEach(u => {
                        const li = document.createElement('li');
                        li.textContent = "🟢 " + u;
                        ul.appendChild(li);
                    });
                }
            };

            ws.onclose = () => {
                // Если соединение закрыто не по нашей инициативе (не logout)
                if (isAuthenticated()) {
                    alert("Соединение разорвано. Попробуйте обновить страницу.");
                }
            };
        }

        // ---------- Автоматический вход при загрузке страницы ----------
        function tryAutoLogin() {
            const savedUser = getSavedUsername();
            if (!savedUser) return false;

            myUsername = savedUser;
            connectWebSocket();

            ws.onopen = () => {
                // Запрашиваем пароль (для безопасности не храним)
                const pass = prompt(`Введите пароль для ${savedUser} (для продолжения сессии)`);
                if (pass) {
                    ws.send(JSON.stringify({ type: "login", username: savedUser, password: pass }));
                } else {
                    // Если пользователь отменил ввод — выходим
                    clearAuth();
                    location.reload();
                }
            };
            return true;
        }

        // ---------- Ручной вход ----------
        function login() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            if (!user || !pass) {
                alert("Введите логин и пароль");
                return;
            }
            
            myUsername = user;
            connectWebSocket();
            
            ws.onopen = () => {
                ws.send(JSON.stringify({ type: "login", username: user, password: pass }));
            };
        }

        // ---------- Отправка сообщения ----------
        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
            
            ws.send(JSON.stringify({ type: "chat", text: text }));
            input.value = '';
            input.focus();
        }

        // ---------- Рендер сообщения ----------
        function renderMessage(user, text, time) {
            const div = document.createElement('div');
            div.className = 'message ' + (user === myUsername ? 'my' : '');
            
            const metaSpan = document.createElement('span');
            metaSpan.className = 'meta';
            metaSpan.innerHTML = `<b>${user}</b> <span>${time || ''}</span>`;
            
            div.appendChild(metaSpan);
            div.appendChild(document.createTextNode(text));
            
            const msgBox = document.getElementById('messages');
            msgBox.appendChild(div);
            msgBox.scrollTop = msgBox.scrollHeight;
        }

        // ---------- Инициализация при загрузке страницы ----------
        window.addEventListener('DOMContentLoaded', () => {
            // Если есть сохранённая сессия — пробуем автоматически войти
            if (isAuthenticated()) {
                tryAutoLogin();
            } else {
                // Показываем экран входа
                document.getElementById('auth-screen').style.display = 'block';
                document.getElementById('chat-screen').style.display = 'none';
            }
        });

        // Предотвращаем случайное закрытие вкладки с активным чатом (не обязательно)
        window.addEventListener('beforeunload', (e) => {
            if (ws && ws.readyState === WebSocket.OPEN && myUsername) {
                // Можно было бы отправить уведомление о выходе, но сервер сам поймёт при разрыве
            }
        });
    </script>
</body>
</html>
